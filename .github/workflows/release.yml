name: 打包 Windows 发布版

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装 uv
        run: |
          pip install uv

      - name: 同步依赖
        run: |
          uv sync

      - name: 构建 generator.exe
        run: |
          uv run build_generator.py

      - name: 构建 downloader.exe
        run: |
          uv run build_downloader.py

      - name: 获取版本号
        id: get_version
        shell: powershell
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          echo "version=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 创建压缩包
        shell: powershell
        run: |
          $VERSION = "${{ steps.get_version.outputs.version }}"
          $ZIP_NAME = "Steam-Download-Proxy-Generator-$VERSION.zip"
          
          # 创建临时目录
          $TEMP_DIR = "temp_package"
          New-Item -ItemType Directory -Path $TEMP_DIR -Force
          
          # 复制 exe 文件
          Copy-Item -Path "output/generator.exe" -Destination "$TEMP_DIR/"
          Copy-Item -Path "output/downloader.exe" -Destination "$TEMP_DIR/"
          
          # 创建压缩包
          Compress-Archive -Path "$TEMP_DIR/*" -DestinationPath $ZIP_NAME -Force
          
          # 清理
          Remove-Item -Path $TEMP_DIR -Recurse -Force
          
          echo "ZIP_NAME=$ZIP_NAME" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Steam-Download-Proxy-Generator ${{ steps.get_version.outputs.version }}
          body: |
            ## Steam-Download-Proxy-Generator v${{ steps.get_version.outputs.version }}
            
            ### 包含文件
            - `generator.exe` - 生成器
            - `downloader.exe` - 下载器
            
            ### 使用说明
            1. 解压压缩包
            2. 运行 generator.exe 或 downloader.exe
          files: |
            Steam-Download-Proxy-Generator-*.zip
          draft: false
          prerelease: false